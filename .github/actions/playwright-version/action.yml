name: 'Detect Playwright version'
description: >-
  Reads the resolved Playwright version from pnpm-lock.yaml so workflow jobs can pin a matching
  mcr.microsoft.com/playwright container image. Using the lockfile (not the package.json range)
  guarantees the image tag matches the binary pnpm actually installs.
outputs:
  version:
    description: 'Resolved Playwright version, e.g. 1.59.1'
    value: ${{ steps.read.outputs.version }}
  image:
    description: 'Fully qualified Playwright container image'
    value: ${{ steps.read.outputs.image }}
runs:
  using: composite
  steps:
    - id: read
      shell: bash
      run: |
        set -euo pipefail

        workspace="${GITHUB_WORKSPACE:-$PWD}"
        lockfile="${workspace}/pnpm-lock.yaml"

        if [ ! -f "$lockfile" ]; then
          echo "::error::pnpm-lock.yaml not found at $lockfile"
          exit 1
        fi

        # Lockfile package entries look like:
        #   playwright@1.59.1:
        # Anchor on line start + leading whitespace + trailing colon so we don't
        # accidentally match substrings inside other entries such as
        # "@vitest/browser-playwright@4.0.18(playwright@1.59.1)".
        version=$(grep -m1 -oE "^[[:space:]]+playwright@[0-9]+\.[0-9]+\.[0-9]+:" "$lockfile" \
                  | sed -E 's/^[[:space:]]+playwright@//; s/:$//' || true)

        if [ -z "$version" ]; then
          echo "::error::could not find playwright in $lockfile"
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "image=mcr.microsoft.com/playwright:v${version}-noble" >> "$GITHUB_OUTPUT"
