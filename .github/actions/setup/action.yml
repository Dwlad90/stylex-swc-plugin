name: 'Setup'
description: 'Prepare the environment for the workflow'
inputs:
  setup-rust:
    description: Whether to install Rust toolchain and cargo cache
    required: false
    default: 'true'
  rust-target:
    description: Optional Rust target(s) to install (comma-separated)
    required: false
    default: ''
  setup-pnpm:
    description: Whether to install pnpm package manager
    required: false
    default: 'true'
  node-version:
    description: Node.js version to install
    required: false
    default: '24.14.0'
  node-architecture:
    description: Optional Node.js architecture
    required: false
    default: ''
  install-dependencies:
    description: Whether to run pnpm install
    required: false
    default: 'true'
  install-recursive:
    description: Whether pnpm install should be recursive
    required: false
    default: 'true'
  frozen-lockfile:
    description: Lockfile mode (auto, true, false)
    required: false
    default: 'auto'
runs:
  using: 'composite'
  steps:
    - name: Setup Rust
      if: ${{ inputs['setup-rust'] == 'true' }}
      uses: ./.github/actions/setup-rust
      with:
        target: ${{ inputs['rust-target'] }}

    - name: Setup pnpm
      if: ${{ inputs['setup-pnpm'] == 'true' }}
      uses: ./.github/actions/setup-pnpm
      with:
        node-version: ${{ inputs['node-version'] }}
        node-architecture: ${{ inputs['node-architecture'] }}
        install-dependencies: ${{ inputs['install-dependencies'] }}
        install-recursive: ${{ inputs['install-recursive'] }}
        frozen-lockfile: ${{ inputs['frozen-lockfile'] }}
