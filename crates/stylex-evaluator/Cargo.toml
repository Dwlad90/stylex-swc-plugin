[package]
name = "stylex_evaluator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "JS expression evaluation engine for StyleX SWC plugin"


[lib]
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
swc_core = { workspace = true, features = [
  "common",
  "ecma_plugin_transform",
  "ecma_utils",
  "ecma_parser",
  "ecma_codegen",
] }
indexmap.workspace = true
rustc-hash.workspace = true
murmur2.workspace = true
radix_fmt.workspace = true
base62.workspace = true
md5.workspace = true
anyhow.workspace = true
log.workspace = true

stylex_constants = { path = "../stylex-constants" }
stylex_types = { path = "../stylex-types" }
stylex_ast_utils = { path = "../stylex-ast-utils" }
stylex_macros = { path = "../stylex-macros" }
stylex_path_resolver = { path = "../stylex-path-resolver" }

[dev-dependencies]
ctor.workspace = true
pretty_env_logger.workspace = true
