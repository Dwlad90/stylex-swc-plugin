[package]
description = "Type definitions, enums, structs and traits for StyleX SWC plugin"
edition.workspace = true
license.workspace = true
name = "stylex_types"
repository.workspace = true
rust-version.workspace = true
version.workspace = true


[lib]
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
anyhow.workspace = true
derive_more.workspace = true
indexmap.workspace = true
log.workspace = true
once_cell.workspace = true
rustc-hash.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
swc_core = { workspace = true, features = [
  "common",
  "ecma_codegen",
  "ecma_parser",
  "ecma_plugin_transform",
  "ecma_utils",
] }

stylex_constants = { path = "../stylex-constants" }
stylex_enums = { path = "../stylex-enums" }
stylex_macros = { path = "../stylex-macros" }
stylex_structures = { path = "../stylex-structures" }
stylex_utils = { path = "../stylex-utils" }

[dev-dependencies]
ctor.workspace = true
pretty_env_logger.workspace = true
