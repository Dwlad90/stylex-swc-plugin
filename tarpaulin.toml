[default]
# Workspace settings
workspace = false             # Run in single-crate mode; --workspace flag is passed by the npm script
all-features = true           # Ensure all conditionally compiled code behind features is tested
release = false               # Run in debug mode (default, better for coverage mapping)

# Coverage Engine
engine = "Llvm"               # LLVM is significantly more accurate and faster than the default ptrace engine

# Exclusions & Ignored Code
ignore-tests = true           # Don't count the test functions themselves in the coverage metric
ignore-panics = true          # Ignore panic/unwind branches (crucial for hitting 100% in Rust)
skip-clean = true             # Reuse build artifacts between runs for faster local iteration

exclude-files = [
    "**/build.rs",
    "**/tests/**",
    "**/benches/**",
    "**/examples/**",
    "**/.DS_Store",
    "**/crates/stylex-logs/**",
    "**/crates/stylex-transform/**",
    "**/stylex-rs-compiler/**",
    "**/stylex-test-parser/**",
    "**/stylex-css-parser/**",
    "crates/stylex-logs/**",
    "crates/stylex-rs-compiler/**",
    "crates/stylex-test-parser/**",
    "crates/stylex-transform/**",
    "crates/stylex-css-parser/**",
    "crates/stylex-css/src/values/parser.rs",
]

# Output settings
out = ["Json"]                # Keep CLI coverage output aligned with workspace `test:coverage`
output-dir = "target/tarpaulin"
target-dir = "target/tarpaulin"

# Enforcement
fail-under = 100              # Fail the CI/run if coverage drops below 100%

# General run settings
timeout = '300s'                 # Give tests up to 5 minutes to complete to prevent hanging
color = "Always"

# Run only unit/integration tests across all packages.
# Bin-only crates do not expose doctests and would fail if doctests are forced.
run-types = ["Tests"]
doc = false
