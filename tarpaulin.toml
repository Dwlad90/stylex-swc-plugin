[default]
# Workspace settings
workspace = true
all-features = true           # Ensure all conditionally compiled code behind features is tested
release = false               # Run in debug mode (default, better for coverage mapping)

# Coverage Engine
engine = "Llvm"               # LLVM is significantly more accurate and faster than the default ptrace engine

# Exclusions & Ignored Code
ignore-tests = true           # Don't count the test functions themselves in the coverage metric
ignore-panics = true          # Ignore panic/unwind branches (crucial for hitting 100% in Rust)
exclude-files = [
    "build.rs",               # Usually doesn't need to be part of the final binary coverage
    "*/tests/*",              # Exclude integration test directories
    "*/benches/*",            # Exclude benchmark directories
    "*/examples/*",           # Exclude example directories
]

# Output settings
out = ["Html", "Lcov"]        # Generate an HTML report for humans and Lcov for CI tools (like Codecov)
output-dir = "target/tarpaulin"

# Enforcement
fail-under = 100              # Fail the CI/run if coverage drops below 100%

# General run settings
timeout = '300s'                 # Give tests up to 5 minutes to complete to prevent hanging
color = "Always"

# Run types: specify what should be executed
# 'Tests' covers unit/integration tests
# 'Doctests' covers examples in your doc comments (///)
run-types = ["Tests", "Doctests"]

# Explicitly enable documentation test coverage
doc = true

# --- Optional CI Profile ---
# You can run `cargo tarpaulin --profile ci` in your pipeline
[ci]
out = ["Xml", "Lcov"]         # XML (Cobertura) is often preferred by CI environments
color = "Never"
